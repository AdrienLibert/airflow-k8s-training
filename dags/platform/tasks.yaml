tasks:
  get_hello:
    do_xcom_push: true

  get_world:
    do_xcom_push: true

  print_message:
    arguments:
      - "{{ ti.xcom_pull(task_ids='get_hello') }}"
      - "{{ ti.xcom_pull(task_ids='get_world') }}"

  preflight:
    env_vars: &metrics_env
      EVENTS_SOURCE: /app/fixtures/events/raw.jsonl
      DATA_INTERVAL_START: "{{ data_interval_start.isoformat() }}"

  extract_hourly:
    env_vars:
      <<: *metrics_env
    do_xcom_push: true

  normalize:
    env_vars:
      <<: *metrics_env
    arguments:
      - "{{ ti.xcom_pull(task_ids='extract_hourly') }}"
    do_xcom_push: true

  aggregate:
    env_vars:
      <<: *metrics_env
    arguments:
      - "{{ ti.xcom_pull(task_ids='normalize') }}"
    do_xcom_push: true

  write_summary:
    env_vars:
      <<: *metrics_env
    arguments:
      - "{{ ti.xcom_pull(task_ids='aggregate') }}"
    do_xcom_push: true

  verify:
    env_vars:
      <<: *metrics_env
    arguments:
      - "{{ ti.xcom_pull(task_ids='write_summary') }}"
    do_xcom_push: true

  notify_summary:
    env_vars:
      <<: *metrics_env
    arguments:
      - "{{ ti.xcom_pull(task_ids='verify') }}"
